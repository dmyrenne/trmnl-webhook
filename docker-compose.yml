services:
  trmnl-dashboard:
    image: ghcr.io/dmyrenne/trmnl-webhook:latest
    container_name: trmnl-dashboard
    restart: unless-stopped
    env_file:
      - .env
    ports:
      # Erreichbar im Browser unter http://localhost:3210
      - "3210:3000"
    volumes:
      # Gekaufte Fonts hier ablegen (siehe README)
      - ./src/views/fonts:/app/src/views/fonts:ro
    # Erforderlich für Chromium inside Docker
    shm_size: '256mb'
    cap_add:
      - SYS_ADMIN
